                content: 'Em um mundo onde as estruturas são quadradas, numa cidade costeira tomada por grandes corporações, as pessoas vivem na pobreza e na miséria. Alguns até se salvam, conseguindo trabalhar para essas corporações. Laila trabalhava em uma plataforma petrolífera de extrema importância como gerente. Ela estava lá apenas para atender seu superior quando uma carga chegava ou saía. Muitos que trabalhavam naquele local eram infelizes e não tinham perspectiva de futuro, pois, naquele mundo, graças às grandes corporações, muitos estavam morrendo ou desaparecendo sem explicação. Até que Jack aparece, do nada, pedindo ajuda enquanto se afogava no mar. Quando foi resgatado, disseram a ele que não deveria estar ali e que seria mandado embora assim que a próxima carga estivesse pronta. Jack não entendeu bem o que estavam dizendo, não sabia que estava em uma plataforma de petróleo, mas se apaixonou à primeira vista por Laila. Quando a carga estava prestes a sair, Laila o chamou, e juntos entraram no navio rumo ao porto. Jack então pergunta: — O que está acontecendo com os trabalhadores? Eles parecem infelizes e sussurravam algo como se eu fosse um monstro. Enquanto desviava de outras embarcações, Laila respondeu: — Nessa cidade, um homem controla tudo. Ele não é chefe de Estado, mas age como um ditador. Quem o desrespeita desaparece ou morre no dia seguinte.  Jack não acreditava naquela história, mas sentia que havia algo errado. Ao chegarem ao porto, logo após desembarcarem, Jack se despediu de Laila. Porém, um bando de piratas os abordou. Eles eram diferentes: não agiam no mar, pois sabiam que lá não era seguro. Laila, que já estava prestes a entrar em seu Porsche, pulou para dentro e acelerou com tudo na direção de Jack, que tentava pular sobre o carro para escapar da situação. Nessa atitude desesperada, os dois caíram no mar, mas, por alguma razão, o carro se manteve sobre a água, como se houvesse alguma magia ali. Os piratas, ao verem isso, tentaram fazer o mesmo, mas afundaram imediatamente. Devido às ondas, eles voltaram à plataforma e acabaram rampando, colidindo com a sala de controle onde Laila trabalhava. Ao perceberem o estrago, ficaram aliviados por estarem vivos. Mas, logo em seguida, o chefe ligou para saber da próxima carga, que já estava atrasada. Laila entrou em desespero, pois o painel de controle havia sido quebrado e não havia como liberar o navio. Numa atitude conjunta, todos os trabalhadores tentaram arrancar os cabos para liberar o navio e se salvarem. Mesmo conseguindo, o chefe decidiu averiguar a situação. Ao notar toda a bagunça e reconhecer Jack, entrou em estado de fúria e mandou todas as suas embarcações para a plataforma, ordenando que matassem os dois. Alguns trabalhadores, sem suportar a pressão e o medo de morrer, decidiram se jogar ao mar. Jack e Laila, com a ajuda dos demais, improvisaram uma jangada para fugir. Jack estava com muito medo de cair daquela altura em uma simples jangada, mas venceu seu medo, se espatifando e usando a estrutura como amortecedor. Eles notaram uma grande quantidade de navios parados e sem ninguém a bordo, como navios fantasmas. Ao tentarem salvar um dos trabalhadores que havia se jogado, perceberam que o homem estava afundando. Ao mergulharem para resgatá-lo, ele se transformou em um navio, revelando o grande plano da megacorporação: transformar todos os desertores em embarcações para vendê-las e lucrar com isso. Laila aproveitou que o navio estava voltando à superfície e se agarrou a ele, subindo até a cabine de navegação. Lá, ligou os motores para fugir daquele lugar. Jack, ainda no mar, percebeu que um grande tsunami se aproximava. Ao tocar no navio, notou que ao redor havia se formado o mesmo gelo que antes o salvara de afundar com o carro. Jack então subiu à cabine e disse que ele deveria conduzir a embarcação, pois possuía poderes de gelo que os acelerariam. Laila não acreditou, mas Jack a empurrou para o lado e o navio começou a andar numa velocidade nunca antes vista, provando a Laila que ele era diferente. Quando a onda estava prestes a alcançá-los, eles aceleraram com tudo e, numa onda contrária, usaram-na como rampa. Pela alta velocidade, voaram por quilômetros e não sabiam mais onde estavam, caindo perto de uma casa cercada por uma floresta. Ao aterrissarem, decidiram ir até a casa. Parecia não haver ninguém, apenas dois cachorros. Entraram e prometeram apenas descansar um pouco e recompensar os moradores no dia seguinte. Laila adormeceu, mas, quando Jack se preparava para dormir, os três moradores da casa apareceram e, em tom ameaçador, começaram a questionar quem eram eles e o que queriam. Laila acordou desesperada, e Jack respondeu que todos deveriam se acalmar, pois iriam explicar. Ele contou sobre toda a situação que estavam passando e de onde vieram. Um dos moradores respondeu que eles estavam muito longe para terem chegado ali tão rápido. Jack então os alertou sobre o tsunami que estava por vir e disse que eles não estariam seguros se continuassem ali.'
            },
        ];

        const storiesContainer = document.getElementById('storiesContainer');

        function renderAllStories() {
            storiesContainer.innerHTML = '';
            stories.forEach((story, index) => {
                const storyCard = document.createElement('article');
                storyCard.className = 'story-card';
                storyCard.setAttribute('tabindex', '0');
                storyCard.setAttribute('role', 'button');
                
                storyCard.innerHTML = `
                    <button type="button" class="story-close">×</button>
                    <div class="story-card-inner">
                        <h2>${story.title}</h2>
                        <div class="story-text"><p>${story.content}</p></div>
                    </div>
                `;

                const closeBtn = storyCard.querySelector('.story-close');
                
                storyCard.addEventListener('click', function () {
                    storyCard.classList.add('expanded');
                });
                
                storyCard.addEventListener('keydown', function (event) {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        storyCard.classList.add('expanded');
                    }
                });
                
                closeBtn.addEventListener('click', function (event) {
                    event.stopPropagation();
                    storyCard.classList.remove('expanded');
                });
                
                storiesContainer.appendChild(storyCard);
            });
        }

        renderAllStories();
    </script>
</body>
</html>
